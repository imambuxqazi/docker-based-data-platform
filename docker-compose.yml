x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${AIRFLOW__CORE__DEFAULT_TIMEZONE}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__API__AUTH_BACKENDS: ${AIRFLOW__API__AUTH_BACKENDS}
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    AIRFLOW_UID: ${AIRFLOW_UID}
    AIRFLOW_GID: ${AIRFLOW_GID}
    PYTHONPATH: ${AIRFLOW_PYTHONPATH}
    LOG_LEVEL: ${LOG_LEVEL}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    APP_DB_HOST: ${APP_DB_HOST}
    APP_DB_PORT: ${APP_DB_PORT}
    APP_DB_NAME: ${APP_DB_NAME}
    APP_DB_USER: ${APP_DB_USER}
    APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    BRONZE_BUCKET: ${BRONZE_BUCKET}
    SILVER_BUCKET: ${SILVER_BUCKET}
    GOLD_BUCKET: ${GOLD_BUCKET}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    REDPANDA_BROKERS: ${REDPANDA_BROKERS}
    REDPANDA_TOPIC_CLICKSTREAM: ${REDPANDA_TOPIC_CLICKSTREAM}
    SPARK_MASTER_URL: ${SPARK_MASTER_URL}
    SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY}
    SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY}
    SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS}
    CDC_BATCH_SIZE: ${CDC_BATCH_SIZE}
    CLICKSTREAM_BATCH_SIZE: ${CLICKSTREAM_BATCH_SIZE}
    ORDERS_GENERATOR_SLEEP_SECONDS: ${ORDERS_GENERATOR_SLEEP_SECONDS}
    CLICKSTREAM_GENERATOR_SLEEP_SECONDS: ${CLICKSTREAM_GENERATOR_SLEEP_SECONDS}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipelines:/opt/airflow/pipelines
    - ./config:/opt/airflow/config
    - ./quality:/opt/airflow/quality
    - ./analytics:/opt/airflow/analytics
    - ./alerts:/opt/airflow/alerts
    - ./data_generators:/opt/airflow/data_generators
    - ./tests:/opt/airflow/tests
    - ./docs:/opt/airflow/docs
    - ./init:/opt/airflow/init
    - airflow_logs:/opt/airflow/logs
    - airflow_plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID}:${AIRFLOW_GID}"
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    redpanda:
      condition: service_healthy
  networks:
    - data_platform_network

services:
  postgres:
    image: postgres:16.3
    container_name: data_platform_postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=4
      - -c
      - max_replication_slots=4
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_platform_network

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    container_name: data_platform_redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092"
      - "9644:9644"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - data_platform_network

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: data_platform_redpanda_console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
      KAFKA_SCHEMAREGISTRY_ENABLED: "false"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - data_platform_network

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: data_platform_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_platform_network

  minio-client:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: data_platform_minio_client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set localminio ${MINIO_ENDPOINT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} >/dev/null 2>&1; do
          echo "Waiting for MinIO alias to become available..."
          sleep 2
        done
        /bin/sh /scripts/create_buckets.sh
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BRONZE_BUCKET: ${BRONZE_BUCKET}
      SILVER_BUCKET: ${SILVER_BUCKET}
      GOLD_BUCKET: ${GOLD_BUCKET}
    volumes:
      - ./init/minio:/scripts
    networks:
      - data_platform_network

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: data_platform_spark_master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      PYSPARK_PYTHON: /usr/local/bin/python3.11
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python3.11
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    ports:
      - "7077:7077"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_platform_network

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: data_platform_spark_worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_WEBUI_PORT: 8081
      PYSPARK_PYTHON: /usr/local/bin/python3.11
      PYSPARK_DRIVER_PYTHON: /usr/local/bin/python3.11
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --webui-port 8081
      --cores ${SPARK_WORKER_CORES}
      --memory ${SPARK_WORKER_MEMORY}
    ports:
      - "8088:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data_platform_network

  airflow-init:
    <<: *airflow-common
    container_name: data_platform_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME} \
          --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
          --lastname ${AIRFLOW_ADMIN_LASTNAME} \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} \
          --password ${AIRFLOW_ADMIN_PASSWORD}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: data_platform_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: data_platform_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $$HOSTNAME"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 40s

networks:
  data_platform_network:
    name: data-platform_data_platform_network
    driver: bridge

volumes:
  postgres_data:
    name: data-platform_postgres_data
  minio_data:
    name: data-platform_minio_data
  airflow_logs:
    name: data-platform_airflow_logs
  airflow_plugins:
    name: data-platform_airflow_plugins